name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/socket/Dockerfile
          push: true
          tags: ammarcodeable/super-tic-tac-toe_socket:latest

      - name: Start container for testing
        run: |
          docker run -d --name socket-test ammarcodeable/super-tic-tac-toe_socket
          sleep 2

      - name: Check container logs
        run: docker logs socket-test

      - name: Check container status
        run: if [ "$(docker inspect -f='{{.State.Status}}' socket-test)" != "running" ]; then exit 1; fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Setup SSH key
          echo "$EC2_SSH_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem
          
          # Copy deployment script to EC2
          scp -o StrictHostKeyChecking=no -i ec2_key.pem deploy.sh ${EC2_USER}@${EC2_HOST}:~/
          
          # Execute deployment on EC2
          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ${EC2_USER}@${EC2_HOST} << 'EOF'
            chmod +x ~/deploy.sh
            ~/deploy.sh
          EOF
          
          # Cleanup
          rm -f ec2_key.pem
